<title>Prompted — Builder Points: The Story So Far (from Feb 20, 2026)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --bg: #0b0e14;
    --panel: #121724;
    --track: #1d2436;
    --text: #e8ecf4;
    --dim: #5a6478;
    --gold: #f5c542;
    --row-h: 50px;
    --rows: 12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Chakra Petch', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    overflow-y: auto;
  }
  .stage {
    width: min(960px, 96vw);
    padding: 28px 32px 20px;
    margin: auto 0;
  }
  @media (max-height: 820px) {
    :root { --row-h: 40px; }
    .bar-track { height: 28px; }
    .chip { width: 26px; height: 26px; }
  }
  @media (max-height: 680px) {
    :root { --row-h: 34px; }
    .bar-track { height: 24px; }
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--track);
    padding-bottom: 14px;
    margin-bottom: 18px;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  h1 .accent { color: var(--gold); }
  .game-link {
    display: inline-block;
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-decoration: none;
  }
  .game-link:hover { color: var(--gold); }
  .clock { text-align: right; }
  .clock .date {
    font-size: 30px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .clock .date.flash {
    color: var(--gold);
    text-shadow: 0 0 24px rgba(245, 197, 66, 0.55);
  }
  .clock .day-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--dim);
    margin-top: 2px;
  }

  /* ---------- race ---------- */
  .race {
    position: relative;
    height: calc(var(--row-h) * var(--rows));
  }
  .row {
    position: absolute;
    left: 0;
    right: 0;
    height: var(--row-h);
    display: flex;
    align-items: center;
    gap: 10px;
    will-change: transform, opacity;
  }
  .rank {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--dim);
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }
  .row.leader .rank { color: var(--gold); }
  .chip {
    position: relative;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #0b0e14;
    flex-shrink: 0;
    overflow: hidden;
  }
  .chip img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  body.paused .row { cursor: pointer; }
  body.paused .row:hover .name {
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .bar-track { position: relative; flex: 1; height: 34px; }
  .bar {
    position: absolute;
    inset: 0 auto 0 0;
    border-radius: 6px;
    min-width: 4px;
    opacity: 0.92;
  }
  .row.leader .bar {
    box-shadow: 0 0 18px -2px rgba(245, 197, 66, 0.35);
    outline: 1px solid rgba(245, 197, 66, 0.5);
  }
  .bar-label {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: baseline;
    gap: 10px;
    white-space: nowrap;
    pointer-events: none;
  }
  .name { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
  .handle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: rgba(232, 236, 244, 0.55);
  }
  .pts {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    width: 72px;
    text-align: right;
    flex-shrink: 0;
  }
  .row.leader .pts { color: var(--gold); }

  /* ---------- event ticker (signature) ---------- */
  .ticker {
    height: 34px;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.04em;
    color: var(--gold);
    opacity: 0;
    transition: opacity 0.45s;
  }
  .ticker.show { opacity: 1; }
  .ticker .bolt { font-size: 14px; }
  .ticker .evt-date { color: var(--dim); }

  /* ---------- controls ---------- */
  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    border-top: 1px solid var(--track);
    padding-top: 14px;
  }
  button {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--track);
    border-radius: 6px;
    cursor: pointer;
  }
  button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  #playBtn {
    width: 42px;
    height: 32px;
    font-size: 13px;
  }
  #playBtn:hover { border-color: var(--gold); }
  input[type="range"] {
    flex: 1;
    accent-color: var(--gold);
    cursor: pointer;
  }
  input[type="range"]:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; }
  .speeds { display: flex; gap: 4px; }
  .speeds button {
    padding: 5px 9px;
    font-size: 11px;
    color: var(--dim);
  }
  .speeds button.on {
    color: var(--gold);
    border-color: var(--gold);
  }
  .hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  @media (max-width: 640px) {
    :root { --row-h: 42px; }
    .stage { padding: 16px; }
    h1 { font-size: 18px; }
    .clock .date { font-size: 20px; }
    .handle, .hint { display: none; }
    .pts { width: 56px; font-size: 12px; }
  }
</style>
</head>

const PROFILE_BASE = "https://prmpted.com/";
const FALLBACK = ["#6C8EEF","#E17055","#00B894","#F39C12","#A29BFE","#00CEC9","#FD79A8","#4ECDC4","#FF6B6B","#2ECC71"];
const VISIBLE = 12;
const ROW_H = () => parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--row-h"));

// Precompute cumulative totals per day.
USERS.forEach((u, i) => {
  const cum = new Float64Array(DAYS);
  u.s.forEach(([d, p]) => { cum[d] += p; });
  for (let d = 1; d < DAYS; d++) cum[d] += cum[d - 1];
  u.cum = cum;
  u.color = u.c || FALLBACK[i % FALLBACK.length];
  u.smoothY = null;
});

function valueAt(u, t) {
  const lo = Math.floor(t), hi = Math.min(lo + 1, DAYS - 1);
  return u.cum[lo] + (u.cum[hi] - u.cum[lo]) * (t - lo);
}

const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
function dayLabel(d) {
  const dt = new Date(START + Math.floor(d) * 86400000);
  return MONTHS[dt.getUTCMonth()] + " " + dt.getUTCDate();
}
const fmt = n => Math.floor(n).toLocaleString("en-US");

// Build DOM rows once.
const race = document.getElementById("race");
USERS.forEach(u => {
  const row = document.createElement("div");
  row.className = "row";
  row.style.opacity = "0";
  const ava = AVATARS[u.u]
    ? '<img src="' + AVATAR_BASE + AVATARS[u.u] + '" alt="" loading="lazy" onerror="this.remove()">'
    : '';
  row.innerHTML =
    '<div class="rank"></div>' +
    '<div class="chip" style="background:' + u.color + '">' + u.n.trim().charAt(0).toUpperCase() + ava + '</div>' +
    '<div class="bar-track">' +
      '<div class="bar" style="background:linear-gradient(90deg,' + u.color + 'cc,' + u.color + '55)"></div>' +
      '<div class="bar-label"><span class="name">' + u.n + '</span><span class="handle">@' + u.u + '</span></div>' +
    '</div>' +
    '<div class="pts"></div>';
  row.addEventListener("click", () => {
    if (!playing) window.open(PROFILE_BASE + encodeURIComponent(u.u), "_blank", "noopener");
  });
  race.appendChild(row);
  u.el = row;
  u.rankEl = row.querySelector(".rank");
  u.barEl = row.querySelector(".bar");
  u.ptsEl = row.querySelector(".pts");
});

const dateEl = document.getElementById("dateEl");
const dayEl = document.getElementById("dayEl");
const ticker = document.getElementById("ticker");
const tickerText = document.getElementById("tickerText");
const tickerDate = document.getElementById("tickerDate");
const scrub = document.getElementById("scrub");
const playBtn = document.getElementById("playBtn");

let t = 0;
let playing = !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const seek = location.hash.match(/day=(\d+(?:\.\d+)?)/);
if (seek) { t = Math.min(DAYS - 1, parseFloat(seek[1])); playing = false; }
let speed = 1;               // multiplier
const BASE_DPS = 4;          // days per second at 1x  (~36s full run)
let lastFrame = null;
let flashUntil = 0;

function setPlaying(p) {
  playing = p;
  playBtn.innerHTML = p ? "&#9616;&#9616;" : "&#9654;";
  document.body.classList.toggle("paused", !p);
}
setPlaying(playing);

playBtn.addEventListener("click", () => {
  if (!playing && t >= DAYS - 1) t = 0;   // replay from the start
  setPlaying(!playing);
});
scrub.addEventListener("input", () => { t = parseFloat(scrub.value); setPlaying(false); render(0); });
document.getElementById("speeds").addEventListener("click", e => {
  const b = e.target.closest("button");
  if (!b) return;
  speed = parseFloat(b.dataset.s);
  document.querySelectorAll(".speeds button").forEach(x => x.classList.toggle("on", x === b));
});
document.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); playBtn.click(); }
  if (e.code === "ArrowRight") { t = Math.min(DAYS - 1, t + 1); setPlaying(false); render(0); }
  if (e.code === "ArrowLeft")  { t = Math.max(0, t - 1); setPlaying(false); render(0); }
});

function render(dt) {
  const prevT = t;

  // clock
  dateEl.textContent = dayLabel(t) + " 2026";
  dayEl.textContent = "DAY " + Math.floor(t) + " / " + (DAYS - 1);
  scrub.value = t;

  // standings at time t
  const standings = USERS
    .map(u => ({ u, v: valueAt(u, t) }))
    .sort((a, b) => b.v - a.v || a.u.u.localeCompare(b.u.u));

  const maxV = Math.max(standings[0].v, 1);
  const rowH = ROW_H();
  const ease = dt > 0 ? Math.min(1, dt * 7) : 1;

  standings.forEach((s, rank) => {
    const u = s.u;
    const visible = rank < VISIBLE && s.v > 0;
    const targetY = Math.min(rank, VISIBLE) * rowH;
    if (u.smoothY === null) u.smoothY = targetY;
    u.smoothY += (targetY - u.smoothY) * ease;

    u.el.style.transform = "translateY(" + u.smoothY.toFixed(1) + "px)";
    u.el.style.opacity = visible ? "1" : "0";
    u.el.style.zIndex = visible ? String(VISIBLE - rank + 10) : "0";
    u.el.classList.toggle("leader", rank === 0 && s.v > 0);
    if (!visible) return;

    u.rankEl.textContent = rank + 1;
    u.barEl.style.width = Math.max(0.6, (s.v / maxV) * 100) + "%";
    u.ptsEl.textContent = fmt(s.v);
  });

  // event ticker
  const evt = [...EVENTS].reverse().find(e => t >= e.d && t - e.d < 5);
  if (evt) {
    tickerText.textContent = evt.text;
    tickerDate.textContent = dayLabel(evt.d).toLowerCase();
    ticker.classList.add("show");
  } else {
    ticker.classList.remove("show");
  }

  // gold flash when the achievement wave lands
  if (Math.floor(prevT - dt * BASE_DPS * speed) < 69 && Math.floor(prevT) >= 69) {
    flashUntil = performance.now() + 1400;
  }
  dateEl.classList.toggle("flash", performance.now() < flashUntil);
}

function loop(ts) {
  if (lastFrame === null) lastFrame = ts;
  const dt = Math.min(0.1, (ts - lastFrame) / 1000);
  lastFrame = ts;
  if (playing) {
    t += dt * BASE_DPS * speed;
    if (t >= DAYS - 1) { t = DAYS - 1; setPlaying(false); }
  }
  render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
